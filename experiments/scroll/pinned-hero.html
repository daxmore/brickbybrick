<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinned Hero Reveal - Unified Narrative</title>
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <style>
        :root {
            --bg: #e0e0d6; /* Light beige from screenshot */
            --text: #1a1a1a;
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            width: 100%;
        }

        /* The Main Pinned Stage */
        .story-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Center Content - Always centered during pin */
        .center-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hero-image {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            will-change: width, height, border-radius, transform;
            overflow: hidden;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-header {
            position: absolute;
            z-index: 15;
            font-size: clamp(5rem, 15vw, 15rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 1;
            will-change: transform, opacity;
            pointer-events: none;
        }

        .hero-copy {
            position: absolute;
            z-index: 15;
            max-width: 650px;
            text-align: center;
            font-size: clamp(1.4rem, 3vw, 2.8rem);
            font-weight: 500;
            line-height: 1.15;
            letter-spacing: -0.03em;
            opacity: 0;
            will-change: transform, opacity;
            pointer-events: none;
        }

        .hero-copy span {
            display: inline-block;
            margin-right: 0.25em;
            opacity: 0.1; /* Start dimmed */
            will-change: opacity;
        }

        /* Side Parallax Columns (Drifting side-by-side) */
        .side-columns {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 4vw;
            z-index: 2;
            opacity: 0;
            visibility: hidden;
        }

        .column {
            width: 18vw;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            will-change: transform;
        }

        /* Scattered starting positions */
        #col-1 { transform: translateY(110vh); }
        #col-2 { transform: translateY(140vh); margin-top: 15vh; }
        #col-3 { transform: translateY(120vh); margin-top: 10vh; }
        #col-4 { transform: translateY(150vh); }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1/1; /* Square thumbnails like screenshot */
            background: #d4d4c9;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .outro {
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            position: relative;
        }

        /* Lenis base */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <section class="story-section">
            <!-- Drifting side images (The 4 columns) -->
            <div class="side-columns">
                <div class="column" id="col-1">
                    <div class="thumbnail"><img src="https://picsum.photos/seed/a1/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/a2/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/a3/600/600" alt=""></div>
                </div>
                <div class="column" id="col-2">
                    <div class="thumbnail"><img src="https://picsum.photos/seed/b1/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/b2/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/b3/600/600" alt=""></div>
                </div>
                <div class="column" id="col-3">
                    <div class="thumbnail"><img src="https://picsum.photos/seed/c1/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/c2/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/c3/600/600" alt=""></div>
                </div>
                <div class="column" id="col-4">
                    <div class="thumbnail"><img src="https://picsum.photos/seed/d1/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/d2/600/600" alt=""></div>
                    <div class="thumbnail"><img src="https://picsum.photos/seed/d3/600/600" alt=""></div>
                </div>
            </div>

            <!-- Central Content (Header, Morphing Image, Copy) -->
            <div class="center-content">
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&q=80&w=2070" alt="Center Hero">
                </div>
                
                <h1 class="hero-header">Waabi</h1>
                <h3 class="hero-copy">Fragments of motion and atmosphere gathered into a drifting collection of quiet visual moments.</h3>
            </div>
        </section>

        <section class="outro">
            <h1>Discovery Continued</h1>
        </section>
    </div>

    <!-- Scripts moved to head -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>

    <script>
        // 1. Initialize Lenis Smooth Scroll
        const lenis = new Lenis({ 
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
        });

        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);

        gsap.registerPlugin(ScrollTrigger, Draggable);
        initGlobalNav('../../');

        // 2. Prepare Text for Reveal (Split into spans)
        const heroCopy = document.querySelector('.hero-copy');
        const words = heroCopy.innerText.split(' ');
        heroCopy.innerHTML = words.map(word => `<span>${word}</span>`).join(' ');
        const wordSpans = heroCopy.querySelectorAll('span');

        // 3. Main Story Sequence
        const storySection = document.querySelector('.story-section');
        const heroHeader = document.querySelector('.hero-header');
        const heroImage = document.querySelector('.hero-image');

        ScrollTrigger.create({
            trigger: storySection,
            start: "top top",
            end: "+=800%", 
            pin: true,
            scrub: 1.2, // Smoother scrub
            onUpdate: (self) => {
                const p = self.progress;

                // --- Phase 1: Header Exit (0.0 to 0.22) ---
                const headerP = gsap.utils.clamp(0, 0.22, p) / 0.22;
                gsap.set(heroHeader, {
                    y: -150 * headerP,
                    opacity: 1 - (headerP * 1.8),
                    scale: 1 - (0.05 * headerP),
                    visibility: p > 0.25 ? 'hidden' : 'visible'
                });

                // --- Phase 2: Smooth Word-by-Word Text Reveal (0.22 to 0.55) ---
                const copyFadeInP = gsap.utils.clamp(0.2, 0.28, p);
                const containerOpacityIn = (copyFadeInP - 0.2) / 0.08;
                
                const copyP = gsap.utils.clamp(0.25, 0.55, p);
                const normalizedCopyP = (copyP - 0.25) / 0.3;

                wordSpans.forEach((word, i) => {
                    // Give each word a small window to fade in smoothly
                    const start = (i / wordSpans.length) * 0.8; 
                    const end = start + 0.2; 
                    const wordLocalP = gsap.utils.clamp(start, end, normalizedCopyP);
                    const wordOpacity = gsap.utils.interpolate(0.1, 1, (wordLocalP - start) / 0.2);
                    gsap.set(word, { opacity: wordOpacity });
                });

                // --- Phase 3: Image Shrinks to Center Thumbnail (0.55 to 0.8) ---
                const shrinkP = gsap.utils.clamp(0.55, 0.8, p);
                const normalizedShrinkP = (shrinkP - 0.55) / 0.25;
                
                const width = gsap.utils.interpolate(100, 20, normalizedShrinkP);
                const height = gsap.utils.interpolate(100, 24, normalizedShrinkP);
                const radius = gsap.utils.interpolate(0, 16, normalizedShrinkP);

                gsap.set(heroImage, {
                    width: `${width}vw`,
                    height: `${height}vh`,
                    borderRadius: `${radius}px`,
                    y: normalizedShrinkP * -140 
                });

                // --- Phase 4: Text Exit Fade (0.8 to 0.95) ---
                const copyFadeOutP = gsap.utils.clamp(0.82, 0.95, p);
                const containerOpacityOut = 1 - ((copyFadeOutP - 0.82) / 0.13);

                gsap.set(heroCopy, {
                    opacity: containerOpacityIn * containerOpacityOut,
                    y: normalizedShrinkP * 100,
                    visibility: p > 0.18 && p < 0.98 ? 'visible' : 'hidden'
                });

                // --- Phase 5: Side Columns Parallax Drift (0.75 to 1.0) ---
                const driftP = gsap.utils.clamp(0.75, 1.0, p);
                const normalizedDriftP = (driftP - 0.75) / 0.25;

                gsap.set(".side-columns", {
                    opacity: driftP > 0.75 ? (driftP - 0.75) / 0.15 : 0, 
                    visibility: driftP > 0.75 ? 'visible' : 'hidden'
                });

                gsap.set("#col-1", { yPercent: -180 * normalizedDriftP });
                gsap.set("#col-2", { yPercent: -220 * normalizedDriftP });
                gsap.set("#col-3", { yPercent: -200 * normalizedDriftP });
                gsap.set("#col-4", { yPercent: -240 * normalizedDriftP });
            }
        });

    </script>
</body>
</html>
