<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Zoom Matrix | UI Lab</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-base: #F5F5F0;     /* Soft White */
            --text-dark: #1A1A1A;   /* Near Black */
            --text-muted: #888888;  /* Charcoal Blush */
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-dark);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- OVERLAYS --- */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- LAYOUT SECTIONS --- */
        .intro-spacer {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 1;
        }

        .intro-text h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -4px;
            color: var(--text-dark);
            line-height: 0.9;
        }

        /* --- THE CORE GALLERY --- */
        .gallery-container {
            position: relative;
            background-color: var(--bg-base);
        }

        /* Sticky target area */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Animated Grid Wrapper */
        .gallery-main {
            position: relative;
            width: 100vw;
            height: 100vh;
            will-change: transform;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3-Column Grid Structure */
        .grid-columns {
            display: flex;
            /* width needs to be enough to fill screen when zoomed */
            width: 100%;
            height: 100%;
            gap: 2vw;
            padding: 2vw;
            perspective: 1000px;
        }

        .side-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2vw;
            will-change: transform;
        }

        .center-col {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Individual Cards */
        .img-card {
            width: 100%;
            height: 100%;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Specific sizing */
        .col-left { transform: translateY(-10%); }
        .col-right { transform: translateY(10%); }

        .card-tall { height: 60vh; }
        .card-short { height: 35vh; }
        .center-card { 
            width: 100%;
            height: 60vh;
            transition: filter 0.5s;
        }

        /* --- FLOATING TEXT OVERLAY --- */
        .overlay-text {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            mix-blend-mode: difference;
            color: white;
        }

        .overlay-text h2 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 600;
            letter-spacing: -2px;
        }

        /* --- END SECTION --- */
        .footer-spacer {
            height: 100vh;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>

<body>

    <div class="grain-overlay"></div>

    <section class="intro-spacer">
        <div class="intro-text">
            <h1>GEOMETRY</h1>
            <p style="text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; opacity: 0.5;">Scroll to Expand</p>
        </div>
    </section>

    <!-- Pinned Scroll Gallery -->
    <section class="gallery-container">
        
        <div class="sticky-wrapper">
            
            <div class="overlay-text">
                <h2>THE CORE</h2>
            </div>

            <div class="gallery-main" id="galleryMain">
                
                <div class="grid-columns">
                    <!-- Column 1 (Left: Parallax Up) -->
                    <div class="side-col col-left" id="leftCol">
                        <div class="img-card card-tall"><img src="../../assets/images/hero-2.png" alt="1"></div>
                        <div class="img-card card-short"><img src="../../assets/images/hero-4.png" alt="2"></div>
                        <div class="img-card card-tall"><img src="../../assets/images/hero-3.png" alt="3"></div>
                    </div>

                    <!-- Column 2 (Center: Focal Zoom) -->
                    <div class="center-col">
                        <div class="img-card card-short" style="margin-bottom: 2vw; opacity: 0.5;"><img src="../../assets/images/hero-3.png" alt="Top"></div>
                        <div class="img-card center-card" id="centerCard">
                            <img src="../../assets/images/hero-1.png" alt="Center">
                        </div>
                        <div class="img-card card-short" style="margin-top: 2vw; opacity: 0.5;"><img src="../../assets/images/hero-2.png" alt="Bottom"></div>
                    </div>

                    <!-- Column 3 (Right: Parallax Up) -->
                    <div class="side-col col-right" id="rightCol">
                        <div class="img-card card-short"><img src="../../assets/images/hero-4.png" alt="4"></div>
                        <div class="img-card card-tall"><img src="../../assets/images/hero-3.png" alt="5"></div>
                        <div class="img-card card-short"><img src="../../assets/images/hero-2.png" alt="6"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- The actual scroll trigger space -->
        <div style="height: 300vh;"></div>

    </section>

    <section class="footer-spacer">
        <h2>Transitions complete.</h2>
    </section>

    <!-- Navigation -->
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="../../assets/global-nav.js"></script>

    <script>
        /**
         * CINEMATIC ZOOM MATRIX
         * 
         * Recreating the exact logic from the provided breakdown:
         * 1. Pinned Sticky Container
         * 2. GSAP ScrollTrigger capture progress (0-1)
         * 3. Animate 'gallery-main' scale from 1x to 3.65x
         * 4. Animate side columns Y-axis parallax
         * 5. Smooth text fade
         */

        document.addEventListener("DOMContentLoaded", () => {
            // Smooth Scroll (Lenis)
            const lenis = new Lenis();
            function raf(time) {
                lenis.raf(time);
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);

            // Nav
            if (typeof initGlobalNav === 'function') initGlobalNav('../../');

            // --- GSAP MATRIX LOGIC ---
            gsap.registerPlugin(ScrollTrigger);

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: ".gallery-container",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.2, // Balanced weight
                }
            });

            // 1. Zoom the entire grid
            // As per instructions: scale from 1 to 3.65
            tl.to("#galleryMain", {
                scale: 3.65,
                ease: "none"
            }, 0);

            // 2. Parallax Side Columns Up Faster
            tl.to("#leftCol", {
                y: -1200, // Significant upward travel
                ease: "none"
            }, 0);

            tl.to("#rightCol", {
                y: -1000, // Significant upward travel
                ease: "none"
            }, 0);

            // 3. Fade Out Text Overlay
            tl.to(".overlay-text", {
                opacity: 0,
                scale: 0.8,
                filter: "blur(10px)",
                duration: 0.4
            }, 0);

            // 4. Subtle center focus
            tl.to("#centerCard img", {
                scale: 1.1,
                ease: "none"
            }, 0);

            // 5. Intro parallax
            gsap.to(".intro-text", {
                scrollTrigger: {
                    trigger: ".intro-spacer",
                    start: "top top",
                    end: "bottom top",
                    scrub: true
                },
                y: 100,
                opacity: 0
            });
        });
    </script>
</body>

</html>
