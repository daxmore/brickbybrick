<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Mask Reveal & Parallax Grid | UI Lab</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg-light: #F5F5F0;   /* Soft White */
            --bg-charcoal: #242424; /* Charcoal Shade */
            --text-dark: #1A1A1A;
            --text-light: #F5F5F0;

            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;

            /* The engine of the reveal */
            --mask-size: 0%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body,
        html {
            width: 100%;
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: var(--font-main);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* --- SECTIONS --- */
        .intro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg-light);
            color: var(--text-dark);
            position: relative;
            z-index: 5;
        }

        .outro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg-charcoal);
            color: var(--text-light);
            position: relative;
            z-index: 5;
        }

        .intro h1,
        .outro h2 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 900;
            opacity: 0.8;
        }

        /* --- THE SPOTLIGHT (PINNED) --- */
        .spotlight {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-light); /* Start Light */
            transition: background-color 0.1s linear;
        }

        /* 1. Background Grid */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200vh;
            /* Taller for parallax */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            z-index: 1;
            filter: grayscale(1) brightness(0.6);
            /* Slightly darker grid */
            will-change: transform;
        }

        .grid-item {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 2. Mask Container */
        .mask-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;

            /* Using CUSTOM crazy_shape.svg */
            -webkit-mask-image: url('../../assets/images/crazy_shape.svg');
            mask-image: url('../../assets/images/crazy_shape.svg');

            -webkit-mask-size: var(--mask-size);
            mask-size: var(--mask-size);

            -webkit-mask-position: center;
            mask-position: center;

            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;

            will-change: mask-size, -webkit-mask-size;
        }

        .masked-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.2) contrast(1.1);
            /* Brighter for reveal */
            will-change: transform;
        }

        /* 3. Reveal Title */
        .reveal-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            width: 90%;
            pointer-events: none;
            font-family: var(--font-heading);
            font-size: clamp(3rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -6px;
            color: #fff;
            mix-blend-mode: difference;
        }

        .reveal-title .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(100px);
            will-change: transform, opacity;
        }

        /* --- ASYMMETRIC GRID SECTION --- */
        .weird-grid-section {
            padding: 20vh 5vw;
            background-color: var(--bg-charcoal);
            color: white;
            position: relative;
        }

        .grid-header {
            margin-bottom: 10vh;
            max-width: 600px;
        }

        .grid-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            margin-bottom: 2rem;
        }

        .asymmetric-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2vw;
            width: 100%;
        }

        .grid-item-weird {
            position: relative;
            background: #1a1a1a;
            overflow: hidden;
            border-radius: 4px;
        }

        .grid-item-weird img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .grid-item-weird:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        /* Layout Positions */
        .item-lg {
            grid-column: 1 / span 7;
            height: 70vh;
            margin-top: 5vh;
        }

        .item-sm {
            grid-column: 9 / span 4;
            height: 40vh;
            margin-top: -5vh;
        }

        .item-md {
            grid-column: 3 / span 5;
            height: 50vh;
            margin-top: 10vh;
        }

        .item-long {
            grid-column: 8 / span 5;
            height: 60vh;
            margin-top: 5vh;
        }

        .item-full {
            grid-column: 2 / span 10;
            height: 80vh;
            margin-top: 15vh;
        }

        .item-caption {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            backdrop-filter: blur(5px);
        }

        /* --- NOISE --- */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body>

    <div class="grain-overlay"></div>

    <!-- Intro -->
    <section class="intro">
        <h1>THE DEPTHS</h1>
        <p style="text-transform: uppercase; letter-spacing: 5px; opacity: 0.4;">Scroll Down</p>
    </section>

    <!-- Spotlight (Pinned Section) -->
    <section class="spotlight">

        <!-- Background Grid -->
        <div class="bg-grid">
            <div class="grid-item"><img src="../../assets/images/hero-2.png" alt="1"></div>
            <div class="grid-item"><img src="../../assets/images/hero-3.png" alt="2"></div>
            <div class="grid-item"><img src="../../assets/images/hero-4.png" alt="3"></div>
            <div class="grid-item"><img src="../../assets/images/hero-2.png" alt="4"></div>
            <div class="grid-item"><img src="../../assets/images/hero-4.png" alt="5"></div>
            <div class="grid-item"><img src="../../assets/images/hero-3.png" alt="6"></div>
            <div class="grid-item"><img src="../../assets/images/hero-2.png" alt="7"></div>
            <div class="grid-item"><img src="../../assets/images/hero-4.png" alt="8"></div>
        </div>

        <!-- Mask Reveal Container -->
        <div class="mask-container">
            <img src="../../assets/images/hero-1.png" alt="High Res" class="masked-img">
        </div>

        <!-- Reveal Title -->
        <h1 class="reveal-title">UNVEIL THE UNSEEN</h1>

    </section>

    <!-- Outro & New Grid -->
    <section class="weird-grid-section">
        <div class="grid-header">
            <h2>EXTRAORDINARY<br>PERSPECTIVES.</h2>
            <p style="opacity: 0.5; border-left: 2px solid #fff; padding-left: 20px;">Breaking the standard grid to
                explore asymmetric beauty and rhythmic layouts.</p>
        </div>

        <div class="asymmetric-container">
            <!-- Large Focus -->
            <div class="grid-item-weird item-lg">
                <img src="../../assets/images/hero-2.png" alt="A1">
                <div class="item-caption">01 // Architectural Soul</div>
            </div>

            <!-- Small Offset -->
            <div class="grid-item-weird item-sm">
                <img src="../../assets/images/hero-3.png" alt="A2">
                <div class="item-caption">02 // Spatial Flow</div>
            </div>

            <!-- Medium Centerish -->
            <div class="grid-item-weird item-md">
                <img src="../../assets/images/hero-4.png" alt="A3">
                <div class="item-caption">03 // Texture Detail</div>
            </div>

            <!-- Long Side -->
            <div class="grid-item-weird item-long">
                <img src="../../assets/images/hero-1.png" alt="A4">
                <div class="item-caption">04 // Light Play</div>
            </div>

            <!-- Full Cinematic -->
            <div class="grid-item-weird item-full">
                <img src="../../assets/images/hero-2.png" alt="A5">
                <div class="item-caption">05 // The Narrative</div>
            </div>
        </div>
    </section>

    <section class="outro">
        <h2>REVEAL COMPLETE.</h2>
    </section>

    <!-- Navigation -->
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="../../assets/global-nav.js"></script>

    <script>
        /**
         * SCROLL-TRIGGERED PARALLAX SVG MASK REVEAL
         * Masterpiece implementation follow-up.
         */

        document.addEventListener("DOMContentLoaded", () => {
            // 1. Initialize Lenis Smooth Scroll
            const lenis = new Lenis({
                lerp: 0.1,
                smoothWheel: true
            });

            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time) => {
                lenis.raf(time * 1000);
            });
            gsap.ticker.lagSmoothing(0);

            // 2. Navigation
            if (typeof initGlobalNav === 'function') initGlobalNav('../../');

            // 3. Vanilla Text Splitter
            const title = document.querySelector(".reveal-title");
            const text = title.textContent;
            title.innerHTML = "";
            text.split(" ").forEach(word => {
                const span = document.createElement("span");
                span.classList.add("word");
                span.textContent = word + "\u00A0"; // Space preservation
                title.appendChild(span);
            });

            // 4. GSAP ScrollTrigger Timeline
            gsap.registerPlugin(ScrollTrigger);

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: ".spotlight",
                    pin: true,
                    start: "top top",
                    end: "+=400%", // 4 stops of 100vh
                    scrub: 1
                }
            });

            // Initial State for Image
            gsap.set('.masked-img', { scale: 1.5 });

            // SEQUENCE:

            // Phase A: Background Parallax (start 0, duration 4)
            tl.to('.bg-grid', {
                yPercent: -30,
                ease: "none",
                duration: 4
            }, 0);

            // Phase B: Mask Expansion & Image Scale (start 1, duration 2)
            tl.to('.spotlight', {
                "--mask-size": "600%", // Large enough to clear the screen corners
                backgroundColor: "#242424", // Animate to Charcoal
                ease: "power2.inOut",
                duration: 2
            }, 1);

            tl.to('.masked-img', {
                scale: 1,
                ease: "power2.inOut",
                duration: 2
            }, 1);

            // Phase C: Words Stagger (start 2.5, duration 1)
            tl.to('.reveal-title .word', {
                opacity: 1,
                y: 0,
                stagger: 0.1,
                ease: "power2.out",
                duration: 1
            }, 2.5);

            // 5. Asymmetric Grid Entrance
            gsap.from(".grid-item-weird", {
                scrollTrigger: {
                    trigger: ".weird-grid-section",
                    start: "top 60%",
                    end: "bottom bottom",
                    toggleActions: "play none none reverse"
                },
                y: 100,
                opacity: 0,
                duration: 1.2,
                stagger: 0.2,
                ease: "power4.out"
            });

        });
    </script>
</body>

</html>
