<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Scroll - Codegrid Architecture</title>
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
        }

        section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 8vw;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .spotlight {
            position: relative;
            padding: 20vh 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
            width: 100%;
            min-height: 100vh;
        }

        .spotlight-image {
            position: relative;
            will-change: transform, clip-path;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spotlight-image img {
            width: 110%;
            height: 110%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }

        /* Lenis base styles */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="intro">
            <h1>Discovery</h1>
        </section>

        <div class="spotlight" id="spotlight">
            <!-- Dynamically generated -->
        </div>

        <section class="outro">
            <h1>Creation</h1>
        </section>
    </div>

    <!-- Scripts -->

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger, Draggable);
        initGlobalNav('../../');

        // 1. Initialize Lenis and Sync with GSAP Ticker
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
        });

        lenis.on('scroll', ScrollTrigger.update);

        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        // 2. Define Configuration for Sine Waves (Math Constants)
        const config = {
            base:   { amp: 120, freq: 0.25, phase: 0 },
            flow:   { amp: 70,  freq: 0.6,  phase: 1.5 },
            detail: { amp: 35,  freq: 1.4,  phase: 3.2 },
            maxInset: 20 // Transition from 20% to 0% to 20%
        };

        const spotlight = document.getElementById('spotlight');
        const totalImages = 12;
        const images = [];

        // 3. Generate HTML
        for (let i = 0; i < totalImages; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'spotlight-image';
            
            const img = document.createElement('img');
            // Using a higher quality seed and fixed dimensions for consistency
            img.src = `https://picsum.photos/seed/${i + 123}/1200/1600`;
            
            wrapper.appendChild(img);
            spotlight.appendChild(wrapper);
            images.push(wrapper);
        }

        // 4. Responsive Sizing Logic
        function updateImageSizes() {
            const winW = window.innerWidth;
            images.forEach((el, i) => {
                const baseWidth = winW > 768 ? 45 : 75;
                // Add some structural variance to the layout
                const variance = Math.sin(i * 0.7) * 8;
                const finalW = baseWidth + variance;
                
                el.style.width = `${finalW}vw`;
                el.style.height = `${finalW * 1.25}vw`;
                el.style.maxHeight = '75vh';
            });
        }

        // 5. Apply Math in onUpdate Loop for Pixel-Perfect Sync
        function initAnimations() {
            images.forEach((el, i) => {
                const normalizedIndex = i / (totalImages - 1);
                const imgElement = el.querySelector('img');
                
                ScrollTrigger.create({
                    trigger: el,
                    start: "top bottom",
                    end: "bottom top",
                    onUpdate: (self) => {
                        const progress = self.progress;
                        
                        // --- The 'Wavy' Math (9:09-10:25) ---
                        // Driving frequency with progress and offsetting by index
                        const p = progress * Math.PI * 2;
                        const idxShift = normalizedIndex * 15;
                        
                        const xBase   = Math.sin(p * config.base.freq + idxShift + config.base.phase) * config.base.amp;
                        const xFlow   = Math.sin(p * config.flow.freq - idxShift + config.flow.phase) * config.flow.amp;
                        const xDetail = Math.sin(p * config.detail.freq + idxShift * 0.8 + config.detail.phase) * config.detail.amp;
                        
                        const totalX = xBase + xFlow + xDetail;

                        // --- Clip-Path Reveal Logic (10:26-10:43) ---
                        // Calculate maskValue: 1 at start, 0 at center (0.5), 1 at end
                        const maskValue = Math.abs(progress - 0.5) * 2;
                        const currentInset = maskValue * config.maxInset;

                        // Apply calculated values via gsap.set for direct property manipulation
                        gsap.set(el, {
                            x: totalX,
                            clipPath: `inset(0% ${currentInset}%)`
                        });

                        // Internal parallax for the image
                        gsap.set(imgElement, {
                            y: (progress - 0.5) * 120,
                            scale: 1.1 // Constant slight scale to cover clip-path edges
                        });
                    }
                });
            });
        }

        // Execution Sequence
        updateImageSizes();
        initAnimations();

        // Handle Window Resize and Refresh ScrollTrigger
        window.addEventListener('resize', () => {
            updateImageSizes();
            ScrollTrigger.refresh();
        });
    </script>
</body>
</html>
