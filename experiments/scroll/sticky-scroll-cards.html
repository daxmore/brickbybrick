<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Scaling Cards | UI Laboratory</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <style>
        /* 
           CONFIGURATION & DESIGN TOKENS
           Colors: Muted Pastel Palette
        */
        :root {
            --soft-blush: #E8D5D0;
            --muted-sage: #C8D8CC;
            --pale-lavender: #D4C9E3;
            --soft-peach: #F0D9D1;
            --muted-blue: #B8D4E8;
            --soft-cream: #F5F1E8;
            
            --text-dark: #2D2D2D;
            --text-light: #5A5A5A;
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--soft-cream);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 
           LAYOUT COMPONENTS
        */
        
        /* Hero Section */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--soft-cream);
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 600;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: var(--text-dark);
        }

        .hero p {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        /* Card Sections */
        .pinned-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background colors for variety using the pastel palette */
        .pinned-section:nth-child(2) { background-color: var(--soft-blush); }
        .pinned-section:nth-child(3) { background-color: var(--muted-sage); }
        .pinned-section:nth-child(4) { background-color: var(--pale-lavender); }
        .pinned-section:nth-child(5) { background-color: var(--muted-blue); }

        .card-wrapper {
            width: 80vw;
            height: 80vh;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            transform-origin: center center;
            will-change: transform, opacity;
            contain: layout style paint;
            backface-visibility: hidden;
        }

        .card-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Extra aesthetic: slight zoom in on images */
            scale: 1.1; 
            /* Ensure visibility fallback if Shery.js fails */
            opacity: 1 !important;
            visibility: visible !important;
        }

        .card-info {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            color: white;
            z-index: 2;
        }

        .card-info h2 {
            font-family: var(--font-display);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .card-info p {
            font-size: 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Overlay to make text readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3));
            pointer-events: none;
        }

        /* Final Scrollable Section */
        .outro {
            width: 100%;
            height: 100vh;
            background-color: var(--soft-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 5;
            position: relative;
        }

        .outro h2 {
            font-family: var(--font-display);
            font-size: 4rem;
            text-transform: uppercase;
        }

        /* Scroll Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background-color: var(--text-dark);
            z-index: 100;
        }

        /* Custom Scroll Smoothness Wrapper */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto;
        }
    </style>
</head>
<body>

    <div class="progress-bar"></div>

    <main id="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <p>Motion Experiment 04</p>
            <h1>Sticky Scape</h1>
        </section>

        <!-- Pinned Card Sections -->
        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-1.png" alt="Sage Hills">
                <div class="card-info">
                    <h2>Sage Sanctuary</h2>
                    <p>Minimalist rolling hills</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-2.png" alt="Lavender Abstract">
                <div class="card-info">
                    <h2>Lavender Drift</h2>
                    <p>Organic abstract composition</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-3.png" alt="Blush Architecture">
                <div class="card-info">
                    <h2>Blush Structure</h2>
                    <p>Architectural geometric detail</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-4.png" alt="Blue Ocean">
                <div class="card-info">
                    <h2>Azure Calm</h2>
                    <p>Serene ocean horizon</p>
                </div>
            </div>
        </section>

        <!-- Outro Section -->
        <section class="outro">
            <h2>The End</h2>
            <p style="margin-top: 1rem; color: var(--text-light);">Scroll back to relive the experience</p>
        </section>
    </main>

    <!-- 
       CRITICAL LIBS
       Using Free GSAP, Lenis, and Shery.js (WebGL)
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>

    <script>
        // --- INITIALIZATION ---
        
        // Register GSAP Plugins
        gsap.registerPlugin(ScrollTrigger, Draggable);

        // Initialize Global Nav
        initGlobalNav('../../');

        // Initialize Lenis Smooth Scroll
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            wheelMultiplier: 1,
            infinite: false,
        });

        // Sync Lenis with ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        // --- Lightweight Hover Effect (replaces heavy Shery.js WebGL) ---
        // Simple scale + brightness shift on hover for a premium feel without GPU thrash
        document.querySelectorAll('.card-wrapper').forEach(card => {
            const img = card.querySelector('img');
            card.addEventListener('mouseenter', () => {
                gsap.to(img, { scale: 1.15, filter: 'brightness(0.85)', duration: 0.8, ease: 'power2.out' });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(img, { scale: 1.1, filter: 'brightness(1)', duration: 0.8, ease: 'power2.out' });
            });
        });

        // --- ANIMATION LOGIC ---

        // 1. Hero Section Fade Out
        gsap.to(".hero h1, .hero p", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: 0.5 // Smoothed scrub for buttery feel
            },
            opacity: 0,
            y: -100,
            ease: "none"
        });

        // 2. Progress Bar
        gsap.to(".progress-bar", {
            width: "100%",
            ease: "none",
            scrollTrigger: {
                trigger: "#main-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 0.3
            }
        });

        // 3. Pinned & Scaling Cards
        const sections = gsap.utils.toArray(".pinned-section");
        
        sections.forEach((section, index) => {
            const card = section.querySelector(".card-wrapper");
            const image = section.querySelector("img");
            
            // Pin each section so the next one scrolls over it
            ScrollTrigger.create({
                trigger: section,
                start: "top top",
                end: "bottom top",
                pin: true,
                pinSpacing: false,
                id: `pin-${index}`
            });

            // Scale down while pinned — scrub: 0.5 adds a smooth lag
            gsap.fromTo(card, 
                { scale: 1 }, 
                {
                    scale: 0.5,
                    opacity: 0.6,
                    ease: "none",
                    scrollTrigger: {
                        trigger: section,
                        start: "top top",
                        end: "bottom top",
                        scrub: 0.5
                    }
                }
            );

            // Subtle image parallax/zoom effect
            gsap.to(image, {
                scale: 1.3,
                ease: "none",
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 0.5
                }
            });
        });

        // 4. Outro Reveal
        gsap.from(".outro h2", {
            scrollTrigger: {
                trigger: ".outro",
                start: "top bottom",
                end: "center center",
                scrub: 0.5
            },
            scale: 0.8,
            opacity: 0,
            y: 50
        });

        // Performance Note
        console.log("%c UI LAB: Sticky Scaling Cards — Optimized (no WebGL) ", "background: #C8D8CC; color: #2D2D2D; font-weight: bold; padding: 4px;");
    </script>
</body>
</html>
