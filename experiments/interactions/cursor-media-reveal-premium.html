<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophisticated Cursor Media Reveal</title>
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ffcc;
            --preview-w: 320px;
            --preview-h: 420px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding-left: 10vw;
        }

        /* 1. LAYOUT: Static Triggers */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .nav-link {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.85;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            text-decoration: none;
            position: relative;
            transition: -webkit-text-stroke 0.4s ease;
        }

        .nav-link:hover {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 1);
        }

        /* 2. THE MEDIA FOLLOWER */
        .media-follower {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--preview-w);
            height: var(--preview-h);
            pointer-events: none; /* CRITICAL */
            z-index: 5;
            opacity: 0;
            will-change: transform;
            /* Center the follower on the offset point */
            transform: translate(-50%, -50%);
        }

        .media-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            /* 4-point clip-path for expansion reveal */
            clip-path: inset(50% 50% 50% 50%); 
            transition: clip-path 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .media-follower.active .media-wrapper {
            clip-path: inset(0% 0% 0% 0%);
        }

        .media-asset {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.2);
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            display: none;
        }

        .media-asset.current {
            display: block;
        }

        .media-follower.active .media-asset.current {
            transform: scale(1);
        }

        .hint {
            position: absolute;
            bottom: 40px;
            left: 10vw;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <nav class="nav-links">
        <a href="#" class="nav-link" data-media="1">Aether</a>
        <a href="#" class="nav-link" data-media="2">Synthetic</a>
        <a href="#" class="nav-link" data-media="3">Kinetic</a>
        <a href="#" class="nav-link" data-media="4">Vortex</a>
    </nav>

    <!-- The Floating Media Follower -->
    <div class="media-follower" id="follower">
        <div class="media-wrapper">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800" class="media-asset" data-id="1">
            <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&q=80&w=800" class="media-asset" data-id="2">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800" class="media-asset" data-id="3">
            <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&q=80&w=800" class="media-asset" data-id="4">
        </div>
    </div>

    <div class="hint">Hover to Reveal Sophisticated Motion</div>

    <script>
        const follower = document.getElementById('follower');
        const links = document.querySelectorAll('.nav-link');
        const assets = document.querySelectorAll('.media-asset');

        // 3. PERFORMANCE: gsap.quickTo for ultra-smooth tracking
        // Offset to the right (15vw) to sit in whitespace
        const offsetX = window.innerWidth * 0.15;

        const xTo = gsap.quickTo(follower, "x", { duration: 0.8, ease: "power3.out" });
        const yTo = gsap.quickTo(follower, "y", { duration: 0.8, ease: "power3.out" });
        const skewTo = gsap.quickTo(follower, "skewX", { duration: 0.4, ease: "power3.out" });
        const rotateTo = gsap.quickTo(follower, "rotation", { duration: 0.4, ease: "power3.out" });

        let lastX = 0;

        window.addEventListener('mousemove', (e) => {
            xTo(e.clientX + offsetX);
            yTo(e.clientY);

            // 4. VELOCITY SKEW: Calculate movement direction for "lag" tilt
            const velocity = e.clientX - lastX;
            const skewAngle = gsap.utils.clamp(-15, 15, velocity * 0.5);
            const rotateAngle = gsap.utils.clamp(-10, 10, velocity * 0.2);
            
            skewTo(skewAngle);
            rotateTo(rotateAngle);
            
            lastX = e.clientX;
        });

        // 5. TRIGGERING LOGIC
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                const id = link.dataset.media;
                
                // Switch assets
                assets.forEach(a => a.classList.toggle('current', a.dataset.id === id));
                
                // Activate container
                follower.classList.add('active');
                gsap.to(follower, {
                    opacity: 1,
                    scale: 1,
                    duration: 0.4,
                    ease: "power2.out"
                });
            });

            link.addEventListener('mouseleave', () => {
                follower.classList.remove('active');
                gsap.to(follower, {
                    opacity: 0,
                    scale: 0.9,
                    duration: 0.3,
                    ease: "power2.in"
                });
            });
        });

        // Initialize Global Nav
        initGlobalNav('../../');
    </script>
</body>
</html>
