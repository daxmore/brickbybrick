<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic | Preloader Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --accent-color: #d1b894;
            --text-color: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --ease-cinematic: cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Preloader Styles */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5vw;
        }

        .counter-wrapper {
            position: relative;
            overflow: hidden;
            transform-origin: bottom left;
            will-change: transform;
        }

        .counter {
            font-family: var(--font-heading);
            font-size: 15vw;
            font-weight: 700;
            line-height: 1;
            margin-bottom: -1vw;
        }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background-color: var(--accent-color);
            will-change: width;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            visibility: hidden;
            /* Hidden initially to avoid FOUC */
        }

        .hero-background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            clip-path: inset(100% 0 0 0);
            /* Collapsed downwards */
            z-index: -1;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.2);
            filter: brightness(0.7);
            will-change: transform, clip-path;
        }

        /* Nav & Layout */
        nav {
            padding: 2.5rem 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: var(--font-heading);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links li a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .nav-links li a:hover {
            opacity: 1;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5vw;
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: 8vw;
            font-weight: 300;
            line-height: 1.1;
            text-transform: uppercase;
            overflow: hidden;
        }

        .hero-subtitle {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 1rem;
            opacity: 0.6;
            overflow: hidden;
        }

        .footer {
            padding: 2.5rem 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            z-index: 10;
        }

        /* Text Animation Helper Classes */
        .char-reveal {
            display: inline-block;
            transform: translateY(100%);
            will-change: transform;
        }

        .line-reveal {
            display: block;
            overflow: hidden;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.4;
        }

        .scroll-mouse {
            width: 20px;
            height: 30px;
            border: 2px solid white;
            border-radius: 10px;
            position: relative;
        }

        .scroll-wheel {
            width: 2px;
            height: 6px;
            background: white;
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            animation: mouse-scroll 1.5s infinite;
        }

        @keyframes mouse-scroll {
            0% {
                transform: translate(-50%, 0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, 5px);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, 10px);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero-title {
                font-size: 15vw;
            }

            .counter {
                font-size: 30vw;
            }
        }

        /* Initial state for specialized reveal */
        .global-nav-container { opacity: 0; pointer-events: none; }
    </style>
</head>

<body>

    <!-- Preloader Overlay -->
    <div id="preloader">
        <div class="counter-wrapper">
            <div id="counter" class="counter">000</div>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-background-container">
            <img src="../../assets/images/hero-bg.png" alt="Hero Background" class="hero-image">
        </div>

        <nav>
            <div class="logo stagger-item">Architrave</div>
            <ul class="nav-links">
                <li class="stagger-item"><a href="#">Projects</a></li>
                <li class="stagger-item"><a href="#">Philosophy</a></li>
                <li class="stagger-item"><a href="#">Contact</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="line-reveal">
                <h1 class="hero-title" id="split-title">Purity of Form</h1>
            </div>
            <div class="line-reveal">
                <p class="hero-subtitle" id="split-subtitle">Minimalist Architectural Vision</p>
            </div>
        </main>

        <footer class="footer">
            <div class="stagger-item">© 2026 Studio</div>
            <div class="stagger-item">London / Tokyo</div>
        </footer>
    </section>

    <script>
        // --- Helper: Text Splitting (Manual SplitText) ---
        function splitTextIntoChars(selector) {
            const elements = document.querySelectorAll(selector);
            elements.forEach(el => {
                const text = el.textContent;
                el.textContent = '';
                [...text].forEach(char => {
                    const span = document.createElement('span');
                    span.textContent = char === ' ' ? '\u00A0' : char;
                    span.className = 'char-reveal';
                    el.appendChild(span);
                });
            });
        }

        // --- Initialize ---
        document.addEventListener('DOMContentLoaded', () => {
            // Split titles into individual characters for staggered reveal
            splitTextIntoChars('#split-title');
            splitTextIntoChars('#split-subtitle');

            const tl = gsap.timeline();

            // 1. Initial State
            gsap.set(".hero", { autoAlpha: 1 });
            const counterObj = { value: 0 };
            const counterElement = document.getElementById('counter');
            const progressBar = document.getElementById('progress-bar');

            // 2. Preloader Phase (0-100 Counter)
            tl.to(counterObj, {
                value: 100,
                duration: 3,
                ease: "power2.inOut",
                onUpdate: () => {
                    let val = Math.floor(counterObj.value);
                    counterElement.textContent = val.toString().padStart(3, '0');
                }
            })
                .to(progressBar, {
                    width: "100%",
                    duration: 3,
                    ease: "power2.inOut"
                }, 0);

            // 3. Preloader Exit
            tl.to(".counter-wrapper", {
                y: -50,
                opacity: 0,
                duration: 0.8,
                ease: "power3.in"
            })
                .to("#preloader", {
                    y: "-100%",
                    duration: 1.2,
                    ease: "expo.inOut"
                }, "-=0.4");

            // 4. Hero Reveal (clip-path & scale)
            tl.to(".hero-background-container", {
                clipPath: "inset(0% 0 0 0)",
                duration: 1.8,
                ease: "expo.inOut"
            }, "-=0.8")
                .to(".hero-image", {
                    scale: 1,
                    duration: 2.5,
                    ease: "expo.out"
                }, "-=1.5");

            // 5. Content Staggered Reveal
            tl.to(".char-reveal", {
                y: "0%",
                duration: 1.2,
                stagger: 0.02,
                ease: "expo.out"
            }, "-=1.2")
                .to(".stagger-item", {
                    y: 0,
                    opacity: 1,
                    duration: 1,
                    stagger: 0.1,
                    ease: "power3.out"
                }, "-=1");

            // 6. Global Nav Reveal
            initGlobalNav('../../');
            tl.to(".global-nav-container", {
                opacity: 1,
                duration: 1,
                pointerEvents: "auto",
                ease: "power2.out"
            }, "-=0.5");
        });
    </script>
</body>

</html>
