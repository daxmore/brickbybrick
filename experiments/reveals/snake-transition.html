<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Snake Transition</title>
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background-color: #f4f7f6;
            transition: background-color 0.5s ease;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            color: #2d3436;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            font-size: 1.2rem;
            color: #636e72;
            margin-bottom: 30px;
            max-width: 500px;
        }

        button {
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: #6c5ce7;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #a29bfe;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.3);
        }

        /* SVG Overlay Styles */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        .transition-overlay svg {
            width: 100%;
            height: 100%;
        }

        .transition-path {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Colorful paths returning to the first design's palette */
        .path-1 { stroke: #6c5ce7; } /* Purple */
        .path-2 { stroke: #ff7675; } /* Coral */
        .path-3 { stroke: #00cec9; } /* Teal */
        .path-4 { stroke: #fdcb6e; } /* Yellow */
        
        /* Alternate page theme */
        body.page-2 {
            background-color: #dfe6e9;
        }
        body.page-2 h1 {
            color: #2d3436;
        }
        body.page-2 button {
            background-color: #ff7675;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2);
        }
    </style>
</head>
<body>

    <div class="container" id="content-container">
        <h1 id="page-title">Page One</h1>
        <p id="page-desc">Watch the fast snake and zigzag patterns sweep from the bottom-left to the top-right.</p>
        <button id="nav-btn">Switch Page</button>
    </div>

    <!-- Diagonal SVG Overlay -->
    <div class="transition-overlay">
        <!-- viewBox 1000x1000. Bottom-left is (0, 1000), Top-right is (1000, 0) -->
        <svg viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <!-- Snake 1: Wide smooth S-curve -->
            <path class="transition-path path-1" d="M -200, 1200 Q 400, 1200 500, 500 T 1200, -200" />
            
            <!-- Snake 2: Tall smooth S-curve -->
            <path class="transition-path path-2" d="M -200, 1200 Q -200, 400 500, 500 T 1200, -200" />
            
            <!-- Zigzag: Sharp diagonal cuts -->
            <path class="transition-path path-3" d="M -200, 1200 L 200, 900 L 100, 600 L 600, 400 L 500, 100 L 1200, -200" />

            <!-- Snake 3: Tight S-curve -->
            <path class="transition-path path-4" d="M -200, 1200 Q 800, 800 500, 500 T 1200, -200" />
        </svg>
    </div>

    <!-- Load GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(Draggable);
            initGlobalNav('../../');
            const paths = document.querySelectorAll('.transition-path');
            const navBtn = document.getElementById('nav-btn');
            const pageTitle = document.getElementById('page-title');
            const pageDesc = document.getElementById('page-desc');
            const body = document.body;
            const contentContainer = document.getElementById('content-container');
            
            let isPage2 = false;
            let transitionTimeline = null;
            let isAnimating = false;

            // Initialize paths as hidden
            paths.forEach(path => {
                const length = path.getTotalLength();
                gsap.set(path, {
                    strokeDasharray: length,
                    strokeDashoffset: length,
                    strokeWidth: 200 // Thicker base width
                });
            });

            function simulateNavigation() {
                if (isAnimating) return;
                isAnimating = true;

                if (transitionTimeline) {
                    transitionTimeline.kill();
                }

                // Leave Animation
                transitionTimeline = gsap.timeline({
                    onComplete: () => {
                        isPage2 = !isPage2;
                        
                        if (isPage2) {
                            pageTitle.textContent = "Page Two";
                            pageDesc.textContent = "The fast diagonal snake effect smoothly guided you here.";
                            navBtn.textContent = "Go Back";
                            body.classList.add('page-2');
                        } else {
                            pageTitle.textContent = "Page One";
                            pageDesc.textContent = "Watch the fast snake and zigzag patterns sweep from the bottom-left to the top-right.";
                            navBtn.textContent = "Switch Page";
                            body.classList.remove('page-2');
                        }

                        startEnterAnimation();
                    }
                });

                // Fade out content
                transitionTimeline.to(contentContainer, {
                    opacity: 0,
                    scale: 0.95,
                    duration: 0.3,
                    ease: "power2.inOut"
                }, 0);

                // Animate paths sweeping from bottom-left to top-right
                paths.forEach((path, index) => {
                    const length = path.getTotalLength();
                    
                    transitionTimeline.fromTo(path, {
                        strokeDashoffset: length,
                        strokeWidth: 200
                    }, {
                        strokeDashoffset: 0,
                        strokeWidth: 1200, // Expand significantly to cover the screen diagonally
                        duration: 0.9,
                        ease: "power2.inOut"
                    }, index * 0.1); // Reduced stagger
                });
            }

            function startEnterAnimation() {
                if (transitionTimeline) {
                    transitionTimeline.kill();
                }

                transitionTimeline = gsap.timeline({
                    onComplete: () => {
                        isAnimating = false;
                    }
                });

                // Fade in content
                transitionTimeline.fromTo(contentContainer, {
                    opacity: 0,
                    scale: 1.05
                }, {
                    opacity: 1,
                    scale: 1,
                    duration: 0.5,
                    ease: "power2.out"
                }, 0.4); // Adjusted for faster exit

                // Push paths forward and off the top-right corner
                paths.forEach((path, index) => {
                    const length = path.getTotalLength();
                    
                    transitionTimeline.fromTo(path, {
                        strokeDashoffset: 0,
                        strokeWidth: 1200
                    }, {
                        strokeDashoffset: -length,
                        strokeWidth: 200,
                        duration: 0.9,
                        ease: "power2.inOut"
                    }, index * 0.1);
                });
            }

            navBtn.addEventListener('click', simulateNavigation);
        });
    </script>
</body>
</html>
