<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staggered Grid Reveal | UI Laboratory</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="../../assets/global-nav.js"></script>

    <style>
        /* 
           DESIGN SYSTEM: Muted Pastel Palette
        */
        :root {
            --soft-blush: #E8D5D0;
            --muted-sage: #C8D8CC;
            --pale-lavender: #D4C9E3;
            --soft-peach: #F0D9D1;
            --muted-blue: #B8D4E8;
            --soft-cream: #F5F1E8;
            
            --text-dark: #2D2D2D;
            --text-muted: #7A7A7A;
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--soft-cream);
            color: var(--text-dark);
            overflow: hidden;
            height: 100vh;
        }

        /* 
           REVEAL OVERLAY (THE MATRIX GRID)
        */
        #reveal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            pointer-events: none; /* Allows interaction under the blocks as they vanish */
        }

        .row {
            display: flex;
            flex: 1;
            width: 100%;
        }

        .block {
            flex: 1;
            height: 100%;
            transform-origin: top; /* Collapses upwards */
            will-change: transform;
        }

        /* 
           MAIN CONTENT (BEHIND REVEAL)
        */
        .content {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5vw;
        }

        .content h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 600;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }

        .content p {
            max-width: 600px;
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Controls for Demo Replay */
        .controls {
            position: fixed;
            bottom: 3rem;
            right: 3rem;
            z-index: 100;
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            background: white;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 50px;
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: var(--soft-cream);
        }

        /* Aesthetic Grain Overlay */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.05;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_600x600.png");
        }

    </style>
</head>
<body>

    <div class="grain"></div>

    <!-- The Mosaic Reveal Grid -->
    <div id="reveal-overlay"></div>

    <!-- Background Content -->
    <main class="content">
        <p style="text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 1rem; color: var(--muted-blue);">Experiment 06</p>
        <h1>Staggered Grid</h1>
        <p>A cinematic matrix transition where visual information flows through a randomized grid, revealing the hidden layers of the interface.</p>
    </main>

    <div class="controls">
        <button class="btn" onclick="playReveal()">Replay Transition</button>
    </div>

    <!-- GSAP Libs moved to head for standardization -->

    <script>
        gsap.registerPlugin(Draggable);
        initGlobalNav('../../');

        // --- CONFIGURATION ---
        const ROWS = 10;
        const COLUMNS = 11;
        const PALETTE = [
            '#E8D5D0', // Soft Blush
            '#C8D8CC', // Muted Sage
            '#D4C9E3', // Pale Lavender
            '#F0D9D1', // Soft Peach
            '#B8D4E8', // Muted Blue
            '#F5F1E8'  // Soft Cream
        ];

        const container = document.getElementById('reveal-overlay');

        // --- GRID GENERATION ---

        function createGrid() {
            container.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                for (let c = 0; c < COLUMNS; c++) {
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'block';
                    
                    // Assign random color from pastel palette
                    const randomColor = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                    blockDiv.style.backgroundColor = randomColor;
                    
                    rowDiv.appendChild(blockDiv);
                }
                container.appendChild(rowDiv);
            }
        }

        // --- ANIMATION LOGIC ---

        function playReveal() {
            // First reset the grid
            createGrid();
            gsap.set(".block", { scaleY: 1 });

            // Create timeline for coordinated reveal
            const tl = gsap.timeline();

            // 1. Reveal Grid (Scale blocks down to 0)
            tl.to(".block", {
                scaleY: 0,
                duration: 1.2,
                ease: "power4.inOut",
                stagger: {
                    amount: 1.5,
                    from: "random" // Creates the 'waterfall' organic effect
                }
            });

            // 2. Subtle Content Entry
            tl.from(".content h1, .content p", {
                y: 30,
                opacity: 0,
                duration: 1,
                stagger: 0.2,
                ease: "power3.out"
            }, "-=1.0"); // Start slightly before reveal ends
        }

        // Initialize on load
        window.onload = playReveal;

        // Beginner-friendly Console feedback
        console.log("%c MATRIX LAB: Staggered Grid LOADED ", "background: #D4C9E3; color: #2D2D2D; font-weight: bold; padding: 4px;");
        console.log("Technique: scaleY(0) + random stagger + pointer-events: none");
    </script>
</body>
</html>
