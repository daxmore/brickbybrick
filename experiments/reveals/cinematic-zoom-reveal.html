<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Zoom Reveal | GSAP Scroll Parallax</title>
    <link rel="stylesheet" href="../../assets/global-nav.css">
    
    <!-- GSAP & ScrollTrigger CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="../../assets/global-nav.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* Scroll Track - Provides the scrollable height */
        .scroll-track {
            height: 400vh;
            position: relative;
        }

        /* Sticky Viewport - Pins the content while scrolling */
        .sticky-container {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Gallery Canvas - The container that zooms out */
        .gallery-canvas {
            position: absolute;
            width: 100vw;
            height: 100vh;
            transform: scale(3); /* Initial zoom state */
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Image Wrapper & Styling */
        .img-wrapper {
            position: absolute;
            overflow: hidden;
            /* Initially sharp corners using clip-path */
            clip-path: inset(0% round 0px);
            will-change: transform, clip-path;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Specific Image Placements */
        .img-center {
            width: 35vw;
            height: 45vh;
            z-index: 2;
        }

        .img-tl { width: 20vw; height: 30vh; top: 5%; left: 5%; }
        .img-tr { width: 25vw; height: 35vh; top: 10%; right: 5%; }
        .img-bl { width: 22vw; height: 32vh; bottom: 8%; left: 10%; }
        .img-br { width: 20vw; height: 30vh; bottom: 5%; right: 10%; }

        /* Text Styling */
        .text-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .text-overlay h1 {
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .word-span {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
            margin: 0 0.2em;
        }

        /* UI/UX Hint */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        /* Sections for context */
        .buffer-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
    </style>
</head>
<body>

    <section class="buffer-section">
        <p>Scroll to Explore</p>
    </section>

    <div class="scroll-track">
        <div class="sticky-container">
            
            <div class="gallery-canvas">
                <!-- Center Image -->
                <div class="img-wrapper img-center">
                    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80&w=1000" alt="Cinematic Landscape">
                </div>

                <!-- Peripheral Images -->
                <div class="img-wrapper img-tl">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=800" alt="Mountain View">
                </div>
                <div class="img-wrapper img-tr">
                    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&q=80&w=800" alt="Serene Lake">
                </div>
                <div class="img-wrapper img-bl">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800" alt="Deep Forest">
                </div>
                <div class="img-wrapper img-br">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800" alt="Snowy Peaks">
                </div>
            </div>

            <div class="text-overlay">
                <h1 id="reveal-text">Immersive Digital Experiences</h1>
            </div>

            <div class="scroll-hint">Scroll Down</div>
        </div>
    </div>

    <section class="buffer-section">
        <h2>Footer or Next Section</h2>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger, Draggable);
        initGlobalNav('../../');

        // Split text into spans for staggered animation
        const textElement = document.getElementById('reveal-text');
        const words = textElement.innerText.split(' ');
        textElement.innerHTML = words.map(word => `<span class="word-span">${word}</span>`).join('');

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "top top",
                end: "bottom bottom",
                scrub: 1,
                pin: false
            }
        });

        // 1. Zoom the canvas from 3 down to 1
        tl.to(".gallery-canvas", {
            scale: 1,
            ease: "none"
        }, 0);

        // 2. Animate corners from sharp to rounded using clip-path inset
        tl.to(".img-wrapper", {
            clipPath: "inset(0% round 40px)",
            ease: "none"
        }, 0);

        // 3. Stagger in the text spans
        tl.to(".word-span", {
            opacity: 1,
            y: 0,
            stagger: 0.1,
            ease: "power2.out"
        }, 0.6);

        // Optional: Subtle parallax movement for images
        tl.to(".img-tl", { y: -50, x: -50, ease: "none" }, 0);
        tl.to(".img-tr", { y: -80, x: 50, ease: "none" }, 0);
        tl.to(".img-bl", { y: 50, x: -80, ease: "none" }, 0);
        tl.to(".img-br", { y: 80, x: 80, ease: "none" }, 0);

    </script>
</body>
</html>
